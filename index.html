    <script>
        function copyCode() {
            const btn = document.getElementById('btn');
            const codeText = "BMDF-9225-VFXOW"; 

            // Robust copy function for mobile compatibility
            const copyToClipboard = (text) => {
                if (navigator.clipboard && window.isSecureContext) {
                    return navigator.clipboard.writeText(text);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    textArea.style.top = "0";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                        return Promise.resolve();
                    } catch (err) {
                        document.body.removeChild(textArea);
                        return Promise.reject(err);
                    }
                }
            };
            
            copyToClipboard(codeText).then(() => {
                const originalContent = btn.innerHTML;
                btn.classList.add('copied');
                btn.innerHTML = '<span class="success-checkmark">✅</span> คัดลอกแล้ว!';
                
                if(typeof fbq === 'function') {
                    fbq('track', 'Contact'); 
                }

                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = originalContent;
                }, 2000);
            }).catch(err => {
                console.error('Copy failed:', err);
                // Simple alert fallback for extreme cases
                alert('Copy failed. Please copy the code manually: ' + codeText);
            });
        }


        var params = new URLSearchParams(window.location.search)
        var vid = params.get('vid')
        
        function trackAndGo() {
            if(typeof fbq === 'function') {
                fbq('track', 'Lead');
            }
            setTimeout(() => {
                window.location.href = "https://99ufa.click/?v=" + vid;
            }, 300);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn').addEventListener('click', copyCode);
            document.getElementById('btn2').addEventListener('click', trackAndGo);
        });
    </script>
